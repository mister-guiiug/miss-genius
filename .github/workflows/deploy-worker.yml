name: Deploy Pronote Worker

# Déploie le proxy Pronote (worker/) sur Cloudflare Workers.
#
# Secrets requis (Repository settings → Secrets and variables → Actions) :
#   CLOUDFLARE_API_TOKEN   — token avec la permission « Edit Workers »
#   CLOUDFLARE_ACCOUNT_ID  — identifiant du compte Cloudflare
#
# Sans ces secrets, le job se termine en succès (déploiement simplement ignoré)
# pour ne pas bloquer la CI : le connecteur Pronote reste optionnel.

on:
  push:
    branches: [main]
    paths:
      - 'worker/**'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install worker dependencies
        working-directory: worker
        run: npm install --no-audit --no-fund

      # Validation du bundling (esbuild) sans déployer — informatif, non bloquant
      # car `pawnote` est une lib non officielle dont l'API peut évoluer.
      - name: Dry-run build
        continue-on-error: true
        working-directory: worker
        run: npx wrangler deploy --dry-run --outdir=.wrangler-dryrun

      - name: Deploy (si secrets Cloudflare présents)
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::warning::Secrets Cloudflare absents — déploiement du Worker ignoré. Ajoutez CLOUDFLARE_API_TOKEN et CLOUDFLARE_ACCOUNT_ID pour l'activer."
            exit 0
          fi
          npx wrangler deploy
